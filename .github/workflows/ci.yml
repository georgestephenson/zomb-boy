name: CI

# Build the ROM and run the full test suite on every push / PR.
# The build is self-bootstrapping: `make` fetches the pinned RGBDS +
# hardware.inc into .tools/, and run-tests.sh creates the pinned PyBoy venv
# there too — so we just cache .tools/ and call the same targets a human does.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The pinned RGBDS asset is a Linux x86_64 tarball and the PyBoy venv is
      # platform-specific, so key the cache on the version pins + fetch scripts.
      # A miss just means the fetch scripts re-download (they verify checksums).
      - name: Cache pinned toolchain + test venv
        uses: actions/cache@v4
        with:
          path: .tools
          key: tools-${{ runner.os }}-${{ hashFiles('Makefile', 'tools/fetch-*.sh', 'tools/setup-testenv.sh') }}

      - name: Build ROM
        run: make

      # Per-bank utilization in the run's summary page, plus a hard floor on
      # ROM0 (the fixed bank is chronically near-full — fail before a change
      # silently eats the last of it).
      - name: Bank utilization report
        run: |
          python3 tools/romstats.py --markdown --top 5 >> "$GITHUB_STEP_SUMMARY"
          python3 tools/romstats.py --top 0 --min-rom0-free 128

      - name: Run tests
        run: make test

      # A quick scripted play-through with screenshots: boot, a wander, and the
      # pause menu, downloadable from every run — eyes on the game without an
      # emulator. Reuses the venv `make test` just built.
      - name: Screenshot smoke
        run: |
          make play SCRIPT='shot boot.png; walk down 36; walk right 60; state; shot world.png; press start; wait 10; shot menu.png'

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: build/play/*.png
          if-no-files-found: error

      # Handy for downloading the built cart straight off a green run. The
      # .sym/.map ride along so any artifact ROM is debuggable (mGBA/Emulicious
      # load the .sym next to the ROM; romstats reads the .map).
      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: zombboy.gbc
          path: |
            build/zombboy.gbc
            build/zombboy.sym
            build/zombboy.map
          if-no-files-found: error
